name: Tests & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel redundant workflows
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Database configuration
  POSTGRES_DB: crypto_trading
  POSTGRES_USER: crypto
  POSTGRES_PASSWORD: crypto_secret_change_me
  DATABASE_URL: postgresql://crypto:crypto_secret_change_me@localhost:5432/crypto_trading
  
  # Redis configuration (for future use)
  REDIS_URL: redis://localhost:6379

jobs:
  # =============================================================================
  # QUICK CHECK (Fast feedback on every commit)
  # =============================================================================
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run quick check
        run: |
          ./scripts/test.sh check
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/cli/generate_wide_vector.py
          python -m py_compile src/application/services/enrichment_service.py
      
      - name: Verify imports
        run: |
          python -c "from src.cli.generate_wide_vector import WideVectorGenerator"
          python -c "from src.application.services.enrichment_service import EnrichmentService"

  # =============================================================================
  # UNIT TESTS (Required for all PRs)
  # =============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quick-check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        run: |
          ./scripts/test.sh unit --tb=short -v
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            .pytest_cache/
            htmlcov/
          retention-days: 7

  # =============================================================================
  # INFRASTRUCTURE + INTEGRATION TESTS (Starts PostgreSQL + Redis)
  # =============================================================================
  integration-tests:
    name: Integration Tests (with Infrastructure)
    runs-on: ubuntu-latest
    needs: unit-tests
    
    # Start infrastructure services (PostgreSQL + Redis)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        volumes:
          - /var/run/postgresql:/var/run/postgresql
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h localhost -p 5432 -U crypto; do
            sleep 1
          done
          echo "✅ PostgreSQL is ready!"
      
      - name: Wait for Redis
        run: |
          echo "Waiting for Redis to be ready..."
          until redis-cli -h localhost -p 6379 ping; do
            sleep 1
          done
          echo "✅ Redis is ready!"
      
      - name: Initialize database schema
        run: |
          echo "📦 Running database migrations..."
          psql -h localhost -U crypto -d crypto_trading -f migrations/001_initial_schema.sql
          psql -h localhost -U crypto -d crypto_trading -f migrations/002_ticker_24hr_stats.sql
          psql -h localhost -U crypto -d crypto_trading -f migrations/004_remove_plpgsql_indicators.sql
          echo "✅ Database schema initialized"
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
      
      - name: Verify infrastructure
        run: |
          echo "🔍 Checking infrastructure..."
          echo "PostgreSQL: $(pg_isready -h localhost -p 5432 -U crypto)"
          echo "Redis: $(redis-cli -h localhost -p 6379 ping)"
          echo "✅ Infrastructure ready"
      
      - name: Run integration tests
        run: |
          echo "🧪 Running integration tests..."
          ./scripts/test.sh integration --tb=short -v
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            /tmp/integration_test_results.json
          retention-days: 7

  # =============================================================================
  # PIPELINE TEST (Critical path - must pass)
  # =============================================================================
  pipeline-test:
    name: Pipeline Test ⭐
    runs-on: ubuntu-latest
    needs: integration-tests
    
    # Start infrastructure services (PostgreSQL + Redis)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U crypto; do
            sleep 1
          done
      
      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping; do
            sleep 1
          done
      
      - name: Initialize database
        run: |
          psql -h localhost -U crypto -d crypto_trading -f migrations/001_initial_schema.sql
          psql -h localhost -U crypto -d crypto_trading -f migrations/002_ticker_24hr_stats.sql
          psql -h localhost -U crypto -d crypto_trading -f migrations/004_remove_plpgsql_indicators.sql
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
      
      - name: Start infrastructure simulation
        run: |
          echo "🚀 Starting infrastructure simulation..."
          echo "✅ PostgreSQL: Running on port 5432"
          echo "✅ Redis: Running on port 6379"
          echo "✅ Database: crypto_trading initialized"
      
      - name: Run pipeline test
        run: |
          echo "🧪 Running critical pipeline test..."
          ./scripts/test.sh pipeline
      
      - name: Upload pipeline results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-test-results
          path: |
            /tmp/integration_test_results.json
          retention-days: 7
      
      - name: Publish test summary
        if: always()
        run: |
          echo "## 🧪 Pipeline Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/integration_test_results.json ]; then
            cat /tmp/integration_test_results.json | python -c "
import sys, json
data = json.load(sys.stdin)
summary = data.get('summary', {})
if data.get('passed'):
    print(f'✅ **PASSED**: {summary.get(\"passed\", 0)}/{summary.get(\"total\", 0)} tests')
else:
    print(f'❌ **FAILED**: {summary.get(\"failed\", 0)}/{summary.get(\"total\", 0)} tests')
" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Test Details" >> $GITHUB_STEP_SUMMARY
            cat /tmp/integration_test_results.json | python -c "
import sys, json
data = json.load(sys.stdin)
for result in data.get('results', []):
    status = '✅' if result.get('passed') else '❌'
    print(f'{status} {result.get(\"name\", \"Unknown\")}')
" >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # CODE QUALITY (Optional - can be enabled)
  # =============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install flake8 mypy black
      
      - name: Run flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run mypy (type checking)
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional || true
      
      - name: Check code formatting
        run: |
          black --check src/ tests/ || true

  # =============================================================================
  # DEPLOYMENT (Only on main branch, after all tests pass)
  # =============================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, pipeline-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check test status
        run: |
          echo "✅ All tests passed! Ready for deployment."
          echo "📦 Configure your deployment steps here."
      
      # Add your deployment steps here:
      # Examples:
      # - name: Deploy to Docker Hub
      #   uses: docker/build-push-action@v5
      #
      # - name: Deploy to Kubernetes
      #   run: kubectl apply -f k8s/
      #
      # - name: Deploy to AWS
      #   uses: aws-actions/configure-aws-credentials@v4
      #
      # - name: Notify Slack
      #   uses: slackapi/slack-github-action@v1
