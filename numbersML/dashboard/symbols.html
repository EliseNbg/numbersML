<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbols - Crypto Trading Dashboard</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-speedometer2"></i> Crypto Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="symbols.html">
                            <i class="bi bi-currency-bitcoin"></i> Symbols
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="indicators.html">
                            <i class="bi bi-graph-up"></i> Indicators
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="chart.html">
                            <i class="bi bi-bar-chart-line"></i> Chart
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="config.html">
                            <i class="bi bi-gear"></i> Config
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-currency-bitcoin"></i> Symbol Management</h1>
                <p class="text-muted">Activate or deactivate symbols for data collection</p>
            </div>
        </div>

        <!-- Bulk Actions -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-lightning"></i> Bulk Actions
                    </div>
                    <div class="card-body">
                        <button id="btn-activate-all" class="btn btn-success me-2">
                            <i class="bi bi-check-all"></i> Activate All
                        </button>
                        <button id="btn-deactivate-all" class="btn btn-warning me-2">
                            <i class="bi bi-x-all"></i> Deactivate All
                        </button>
                        <button id="btn-activate-eu" class="btn btn-info">
                            <i class="bi bi-flag"></i> Activate EU-Compliant Only
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Symbols Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-ul"></i> Symbols</span>
                        <div class="d-flex gap-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="filter-active">
                                <label class="form-check-label" for="filter-active">
                                    Show Active Only
                                </label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="filter-allowed">
                                <label class="form-check-label" for="filter-allowed">
                                    Show Allowed Only
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Symbol</th>
                                        <th>Base</th>
                                        <th>Quote</th>
                                        <th>Active</th>
                                        <th>Allowed</th>
                                        <th>Tick Size</th>
                                        <th>Step Size</th>
                                        <th>Min Notional</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="symbols-table-body">
                                    <tr>
                                        <td colspan="10" class="text-center">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Symbols JS -->
    <script src="js/symbols.js"></script>
</body>
</html>
