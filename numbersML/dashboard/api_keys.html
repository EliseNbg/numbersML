<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Keys - Crypto Trading Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-key"></i> API Key Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="symbols.html">
                            <i class="bi bi-currency-bitcoin"></i> Symbols
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="strategies.html">
                            <i class="bi bi-cpu"></i> Strategies
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="market.html">
                            <i class="bi bi-wallet2"></i> Market
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">
                            <i class="bi bi-receipt"></i> Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="api_keys.html">
                            <i class="bi bi-key"></i> API Keys
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-key"></i> API Key Management</h1>
                <p class="text-muted">Manage encrypted API keys for exchange access</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="row mb-3">
            <div class="col-md-6">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addKeyModal">
                    <i class="bi bi-plus-circle"></i> Add Key
                </button>
                <button class="btn btn-outline-secondary ms-2" id="btn-refresh">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
            <div class="col-md-6 text-end">
                <span class="text-muted"><i class="bi bi-shield-lock"></i> Keys are encrypted at rest</span>
            </div>
        </div>

        <!-- Keys Table -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-list-ul"></i> API Keys
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Environment</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Last Used</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="keys-body">
                            <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Key Modal -->
    <div class="modal fade" id="addKeyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add API Key</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-key-form">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="key-name" placeholder="e.g. Testnet Key" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Environment</label>
                            <select class="form-select" id="key-env">
                                <option value="testnet">Testnet</option>
                                <option value="mainnet">Mainnet</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Key</label>
                            <input type="text" class="form-control" id="key-api" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Secret</label>
                            <input type="password" class="form-control" id="key-secret" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btn-add-key">Add</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';

        async function refreshData() {
            try {
                const response = await fetch(`${API_BASE}/keys`);
                const keys = await response.json();
                const tbody = document.getElementById('keys-body');
                if (keys.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No API keys found</td></tr>';
                } else {
                    tbody.innerHTML = keys.map(k => `
                        <tr>
                            <td>${k.name}</td>
                            <td><span class="badge bg-${k.environment === 'mainnet' ? 'danger' : 'warning'}">${k.environment}</span></td>
                            <td><span class="badge bg-${k.is_active ? 'success' : 'secondary'}">${k.is_active ? 'Active' : 'Inactive'}</span></td>
                            <td>${new Date(k.created_at).toLocaleDateString()}</td>
                            <td>${k.last_used_at ? new Date(k.last_used_at).toLocaleString() : 'Never'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="testKey('${k.id}')">Test</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteKey('${k.id}')">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error('Failed to refresh:', err);
            }
        }

        async function addKey() {
            const name = document.getElementById('key-name').value;
            const env = document.getElementById('key-env').value;
            const apiKey = document.getElementById('key-api').value;
            const apiSecret = document.getElementById('key-secret').value;

            if (!name || !apiKey || !apiSecret) {
                alert('All fields are required');
                return;
            }

            try {
                await fetch(`${API_BASE}/keys?name=${encodeURIComponent(name)}&environment=${env}&api_key=${encodeURIComponent(apiKey)}&api_secret=${encodeURIComponent(apiSecret)}`, { method: 'POST' });
                bootstrap.Modal.getInstance(document.getElementById('addKeyModal')).hide();
                document.getElementById('add-key-form').reset();
                refreshData();
            } catch (err) {
                alert('Failed to add key');
            }
        }

        async function testKey(keyId) {
            try {
                const response = await fetch(`${API_BASE}/keys/${keyId}/test`, { method: 'POST' });
                const result = await response.json();
                alert(result.message);
            } catch (err) {
                alert('Failed to test key');
            }
        }

        async function deleteKey(keyId) {
            if (!confirm('Delete this API key?')) return;
            try {
                await fetch(`${API_BASE}/keys/${keyId}`, { method: 'DELETE' });
                refreshData();
            } catch (err) {
                alert('Failed to delete key');
            }
        }

        document.addEventListener('DOMContentLoaded', refreshData);
        document.getElementById('btn-refresh').addEventListener('click', refreshData);
        document.getElementById('btn-add-key').addEventListener('click', addKey);
    </script>
</body>
</html>
