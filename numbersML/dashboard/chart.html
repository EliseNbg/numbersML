<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart - Crypto Trading Dashboard</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/dashboard.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-speedometer2"></i> Crypto Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="symbols.html">
                            <i class="bi bi-currency-bitcoin"></i> Symbols
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="indicators.html">
                            <i class="bi bi-graph-up"></i> Indicators
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="chart.html">
                            <i class="bi bi-bar-chart-line"></i> Chart
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="config.html">
                            <i class="bi bi-gear"></i> Config
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="bi bi-bar-chart-line"></i> Price Chart</h1>
                <p class="text-muted">Candlestick chart with technical indicators</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="row mb-4">
            <div class="col-md-4">
                <label class="form-label">Symbol</label>
                <select class="form-select" id="chart-symbol">
                    <option value="">Select symbol...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Time Range</label>
                <select class="form-select" id="chart-range">
                    <option value="1m">1 Minute</option>
                    <option value="5m">5 Minutes</option>
                    <option value="15m">15 Minutes</option>
                    <option value="1h" selected>1 Hour</option>
                    <option value="4h">4 Hours</option>
                    <option value="1d">1 Day</option>
                </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button id="btn-load-chart" class="btn btn-primary w-100">
                    <i class="bi bi-arrow-clockwise"></i> Load Chart
                </button>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span id="chart-title">Price Chart</span>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary" id="btn-add-sma">
                                <i class="bi bi-graph-up"></i> SMA
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="btn-add-ema">
                                <i class="bi bi-graph-up-arrow"></i> EMA
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" id="btn-add-rsi">
                                <i class="bi bi-activity"></i> RSI
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="chart-container" style="height: 600px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Indicator Overlays -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-layers"></i> Active Indicators
                    </div>
                    <div class="card-body">
                        <div id="active-indicators" class="d-flex gap-2">
                            <span class="text-muted">No indicators added</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Chart JS -->
    <script src="js/chart.js"></script>
</body>
</html>
