[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --timeout=300
    # Exclude pre-existing broken tests (see tests/BROKEN_TESTS.md)


# Coverage options (comment out for development/debugging to reduce memory)
# Uncomment for production runs:
# --cov=src
# --cov-report=term-missing
# --cov-fail-under=80

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires database)
    e2e: End-to-end tests (full system)
    slow: Slow running tests (>1 second)
    pipeline: Pipeline tests (critical path)
    indicators: Indicator-related tests

# Test execution order: unit first, then integration
# Unit tests must pass before integration tests run
