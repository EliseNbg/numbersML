# Promtail Configuration for Trading System
# Version: 2.9.1
# Purpose: Collect structured logs from trading backend

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Trading Backend Logs
  - job_name: trading-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: trading-backend
          __path__: /home/andy/projects/numbers/logs/*.log
    
    # Extract structured fields from JSON logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            timestamp: timestamp
            correlation_id: correlation_id
            strategy_id: strategy_id
            symbol: symbol
            action: action
            quantity: quantity
            confidence: confidence
            latency_ms: latency_ms
            component: component
            order_id: order_id
            trade_id: trade_id
      
      - labels:
          level:
          logger:
          correlation_id:
          strategy_id:
          symbol:
          action:
          component:
          order_id:
          trade_id
      
      - template:
          source: message
          template: '{{ .message }}'
      
      - output:
          source: message

  # System Logs (optional)
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
  
  # Docker Container Logs (if using Docker later)
  - job_name: docker-logs
    docker:
      host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: job
        regex: 'trading-backend.*'
      - source_labels: [__meta_docker_container_id]
        target_label: container_id

# Trading-specific optimizations
# High throughput logging for 1-second candle processing
positions:
  sync_period: 10s
  max_age: 1h

# Performance tuning
server:
  http_listen_port: 9080
  log_level: warn  # Reduce noise in development

# Log retention and rotation
# Configure your Python app to rotate logs daily
# This ensures Promtail can handle high volume
scrape_configs:
  - job_name: trading-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: trading-backend
          __path__: /home/andy/projects/numbers/logs/*.log
    # Increase batch size for high-throughput trading logs
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            timestamp: timestamp
            correlation_id: correlation_id
            strategy_id: strategy_id
            symbol: symbol
            action: action
            quantity: quantity
            confidence: confidence
            latency_ms: latency_ms
            component: component
            order_id: order_id
            trade_id: trade_id
      - labels:
          level:
          logger:
          correlation_id:
          strategy_id:
          symbol:
          action:
          component:
          order_id:
          trade_id
      - output:
          source: message