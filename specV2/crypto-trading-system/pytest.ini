[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --timeout=60

# Coverage options (comment out for development/debugging to reduce memory)
# Uncomment for coverage reports:
# --cov=src
# --cov-report=term-missing
# --cov-fail-under=50

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires database)
    e2e: End-to-end tests (full system)
    slow: Slow running tests (>1 second)
